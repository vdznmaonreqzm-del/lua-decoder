<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فك تشفير سكريبتات Roblox (كامل)</title>
    <style>
        body {
            background: #0a0a1a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1400px;
            margin: auto;
            background: #1a1a2a;
            padding: 25px;
            border-radius: 20px;
        }
        h1 {
            color: #ffd966;
            text-align: center;
        }
        .row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .col {
            flex: 1;
            min-width: 400px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ffd966;
        }
        textarea {
            width: 100%;
            background: #0f0f1a;
            color: #eee;
            border: 2px solid #3a6ea5;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            min-height: 450px;
        }
        button {
            background: #3a6ea5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #2c5282;
        }
        .btn-danger {
            background: #a53a3a;
        }
        .status {
            margin: 15px 0;
            padding: 10px;
            background: #0f0f1a;
            border-radius: 8px;
            color: #8bc34a;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔓 فك تشفير سكريبتات Roblox (كامل)</h1>
    
    <div class="row">
        <div class="col">
            <label>📥 السكريبت المشفر:</label>
            <textarea id="inputScript" placeholder="الصق السكريبت المشفر هنا..."></textarea>
        </div>
        <div class="col">
            <label>📤 السكريبت المفكوك:</label>
            <textarea id="outputScript" readonly placeholder="ستظهر النتيجة هنا..."></textarea>
        </div>
    </div>
    
    <div style="text-align: center;">
        <button onclick="fullDecode()">🔓 فك التشفير</button>
        <button onclick="copyOutput()">📋 نسخ</button>
    </div>
    
    <div id="status" class="status">✅ جاهز</div>
</div>

<script>
    function decodeAsciiEscapes(str) {
        return str.replace(/\\(\d+)/g, function(match, num) {
            return String.fromCharCode(parseInt(num, 10));
        });
    }
    
    function xorDecrypt(data, key) {
        let result = "";
        for (let i = 0; i < data.length; i++) {
            let dataByte = data.charCodeAt(i);
            let keyByte = key.charCodeAt(i % key.length);
            result += String.fromCharCode(dataByte ^ keyByte);
        }
        return result;
    }
    
    function base64Decode(str) {
        try { return atob(str); } catch(e) { return null; }
    }
    
    function extractV7(text) {
        let regex = /v7\(\s*["']([^"']+)["']\s*,\s*["']([^"']+)["']\s*\)/g;
        let matches = [];
        let match;
        while ((match = regex.exec(text)) !== null) {
            matches.push({ data: match[1], key: match[2], full: match[0] });
        }
        return matches;
    }
    
    function extractLoadstringXor(text) {
        let regex = /loadstring\(game:HttpGet\(v7\(\s*["']([^"']+)["']\s*,\s*["']([^"']+)["']\s*\)\)\)/g;
        let matches = [];
        let match;
        while ((match = regex.exec(text)) !== null) {
            matches.push({ data: match[1], key: match[2], full: match[0] });
        }
        return matches;
    }
    
    function fullDecode() {
        let script = document.getElementById('inputScript').value;
        if (!script.trim()) {
            document.getElementById('outputScript').value = '⚠️ الرجاء لصق السكريبت أولاً.';
            return;
        }
        
        document.getElementById('status').innerHTML = '⏳ جاري فك التشفير...';
        let result = script;
        
        // فك ASCII
        result = decodeAsciiEscapes(result);
        
        // فك v7 داخل loadstring
        let loadXor = extractLoadstringXor(result);
        for (let item of loadXor) {
            let data = decodeAsciiEscapes(item.data);
            let key = decodeAsciiEscapes(item.key);
            let decrypted = xorDecrypt(data, key);
            let b64 = base64Decode(decrypted);
            if (b64) decrypted = b64;
            result = result.split(item.full).join(decrypted);
        }
        
        // فك v7 العادي
        let v7matches = extractV7(result);
        for (let item of v7matches) {
            let data = decodeAsciiEscapes(item.data);
            let key = decodeAsciiEscapes(item.key);
            let decrypted = xorDecrypt(data, key);
            let b64 = base64Decode(decrypted);
            if (b64) decrypted = b64;
            result = result.split(item.full).join(decrypted);
        }
        
        // استخراج الرابط النهائي
        let urlMatch = result.match(/https?:\/\/[^\s"')]+/);
        if (urlMatch) {
            result = "🔗 الرابط المستخرج:\n" + urlMatch[0] + "\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n" + result;
        }
        
        document.getElementById('outputScript').value = result;
        document.getElementById('status').innerHTML = '✅ تم فك التشفير بنجاح!';
    }
    
    function copyOutput() {
        let output = document.getElementById('outputScript');
        output.select();
        document.execCommand('copy');
        document.getElementById('status').innerHTML = '📋 تم نسخ النتيجة!';
        setTimeout(() => {
            document.getElementById('status').innerHTML = '✅ جاهز';
        }, 2000);
    }
</script>
</body>
</html>
