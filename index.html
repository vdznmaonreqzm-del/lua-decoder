<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decoder</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border: 1px solid #444;
            border-radius: 5px;
            background-color: #1e1e1e;
        }
        input, button {
            margin: 10px 0;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }
        button {
            background-color: #6200ea;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #3700b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>أداة فك التشفير</h1>
        <input type="text" id="input" placeholder="أدخل النص المشفر هنا..."><br>
        <button onclick="decodeText()">فك التشفير</button>
        <h2>الناتج:</h2>
        <textarea id="output" rows="5" cols="30" readonly></textarea>
    </div>
    <script>
        function decodeText() {
            const inputText = document.getElementById('input').value;
            // Dummy decoder functionality, replace with actual logic
            // In reality, implement your decoding logic here.
            const outputText = atob(inputText); // Example decode using base64
            document.getElementById('output').value = outputText;
        }
    </script>
