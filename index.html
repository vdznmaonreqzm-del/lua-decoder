<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lua Decoder</title>
</head>
<body>
    <h1>Lua Decoder</h1>
    <label for="encrypted">Enter Encrypted Code:</label><br>
    <textarea id="encrypted" rows="4" cols="50"></textarea><br>
    <button onclick="decode()">Decode</button><br><br>
    <label for="decrypted">Decrypted Output:</label><br>
    <textarea id="decrypted" rows="4" cols="50" readonly></textarea>
    <script>
        function atobPolyfill(str) {
            return Buffer.from(str, 'base64').toString('binary');
        }

        function xorDecrypt(data, key) {
            let decrypted = '';
            for (let i = 0; i < data.length; i++) {
                decrypted += String.fromCharCode(data.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return decrypted;
        }

        function decode() {
            const encrypted = document.getElementById('encrypted').value;
            const key = 'your-key'; // Replace with your key
            const b64decoded = atobPolyfill(encrypted);
            const decrypted = xorDecrypt(b64decoded, key);
            document.getElementById('decrypted').value = decrypted;
        }
    </script>
</body>
</html>
