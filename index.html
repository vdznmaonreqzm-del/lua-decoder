<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة فك التشفير</title>
</head>
<body>
    <h1>أداة فك التشفير</h1>
    <form>
        <label for="method">اختار طريقة فك التشفير:</label>
        <select id="method">
            <option value="base64">Base64</option>
            <option value="xor">XOR</option>
            <option value="rot13">ROT13</option>
            <option value="url">URL</option>
        </select>
        <br>
        <label for="input">النص المدخل:</label>
        <textarea id="input" rows="10" cols="50"></textarea>
        <br>
        <label for="output">النص الناتج:</label>
        <textarea id="output" rows="10" cols="50" readonly></textarea>
        <br>
        <button type="submit">افك التشفير</button>
    </form>
</body>
</html>
