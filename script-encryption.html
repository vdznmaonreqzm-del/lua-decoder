<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Script Encryption Tool</title>\n    <script>\n        function xorEncryption(input, key) {\n            let output = '';\n            for (let i = 0; i < input.length; i++) {\n                output += String.fromCharCode(input.charCodeAt(i) ^ key.charCodeAt(i % key.length));\n            }\n            return output;\n        }\n        function base64Encode(input) {\n            return btoa(unescape(encodeURIComponent(input)));\n        }\n        function encrypt() {\n            const input = document.getElementById('scriptInput').value;\n            const key = document.getElementById('encryptionKey').value;\n            const xorResult = xorEncryption(input, key);\n            const base64Result = base64Encode(xorResult);\n            document.getElementById('encryptedOutput').innerText = base64Result;\n        }\n    <\/script>\n</head>\n<body>\n    <h1>Script Encryption Tool</h1>\n    <textarea id="scriptInput" placeholder="Enter your Roblox script here..." rows="10" cols="50"></textarea>\n    <br>\n    <input type="text" id="encryptionKey" placeholder="Enter encryption key">\n    <br>\n    <button onclick="encrypt()">Encrypt</button>\n    <h2>Encrypted Output:</h2>\n    <pre id="encryptedOutput"></pre>\n</body>\n</html>
